<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FTN Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation for the FTN Webapp.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Modern docsify-themeable Theme: Simple Dark -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  
  <style>
    :root {
      /* Custom variables for docsify-themeable to match a high-end dark design */
      --theme-color: #3b82f6; /* Vibrant Blue accent */
      --base-background: #0f172a; /* Slate 900 background */
      --sidebar-background: #1e293b; /* Slate 800 sidebar */
      --sidebar-width: 280px;
      --content-max-width: 55em;
      --code-theme-background: #0b0f19;
      --heading-color: #f8fafc;
      --base-color: #cbd5e1;
      --sidebar-name-color: #f8fafc;
      --sidebar-name-font-weight: 700;
      --sidebar-nav-link-color: #94a3b8;
      --sidebar-nav-link-color--active: #3b82f6;
      --link-color: #38bdf8; /* Light Blue link color */
      --link-color--hover: #58d3ff;
      
      /* Make sure images look nice */
      --content-image-max-width: 100%;
      --content-image-box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }
    
    /* Small UI adjustment to docsify-themeable's styling */
    .markdown-section pre > code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'FTN Docs',
      repo: '',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation...',
        noData: 'No results found!',
        depth: 6
      },
      copyCode: {
        buttonText: 'Copy to clipboard',
        errorText: 'Error',
        successText: 'Copied'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
