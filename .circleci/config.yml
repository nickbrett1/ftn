version: 2.1

orbs:
  ggshield: gitguardian/ggshield@volatile
  browser-tools: circleci/browser-tools@1.5.3
  sonarcloud: sonarsource/sonarcloud@4.0.0

commands:
  install_doppler:
    description: "Install Doppler CLI"
    steps:
      - run:
          name: Install Doppler CLI
          command: |
            if ! command -v doppler &> /dev/null; then
              (curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh || wget -t 3 -qO- https://cli.doppler.com/install.sh) | sudo sh
            fi

jobs:
  build:
    docker:
      - image: cimg/node:22.23.1-browsers
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          name: Restore node_modules and next cache
          keys:
            # when lock file changes, use increasingly general patterns to restore cache
            - node-v7-fresh-{{ .Branch }}-{{ checksum "webapp/package-lock.json" }}
            - node-v7-fresh-{{ .Branch }}-
            - node-v7-fresh-
      - restore_cache:
          name: Restore Playwright cache
          keys:
            - playwright-{{ .Branch }}-{{ checksum "webapp/package-lock.json" }}
            - playwright-{{ .Branch }}-
            - playwright-
      - run:
          name: Install modules
          command: |
            cd webapp
            npm install
      - run:
          name: Install Playwright Chromium (if not cached)
          command: |
            cd webapp && npx playwright install chromium
      - save_cache:
          name: Cache Playwright
          paths:
            - ~/.cache/ms-playwright
          key: playwright-{{ .Branch }}-{{ checksum "webapp/package-lock.json" }}
      - install_doppler
      - run:
          name: Setup Wrangler configuration
          command: |
            cd webapp && ./scripts/setup-wrangler-config.sh stg
 
      - run:
          name: Build app
          command: |
            cd webapp && npm run build
      - save_cache:
          name: Update node_modules cache
          paths:
            - webapp/node_modules
          key: node-v7-fresh-{{ .Branch }}-{{ checksum "webapp/package-lock.json" }}
      - persist_to_workspace:
          root: webapp
          paths:
            - .svelte-kit
            - static/pdf.worker.min.mjs

  code_test:
    docker:
      - image: cimg/node:22.23.1-browsers
    resource_class: large # Increase to large for more memory and CPU resources
    environment:
      SONAR_SCANNER_OPTS: "-Dproject.settings=.sonarcloud.properties"
    steps:
      - checkout:
          method: full
      - restore_cache:
          name: Restore node_modules
          keys:
            # when lock file changes, use increasingly general patterns to restore cache
            - node-v7-fresh-{{ .Branch }}-{{ checksum "webapp/package-lock.json" }}
            - node-v7-fresh-{{ .Branch }}-
            - node-v7-fresh-
      - attach_workspace:
          at: webapp
      - install_doppler
      - run:
          name: Setup Wrangler configuration
          command: |
            cd webapp && ./scripts/setup-wrangler-config.sh stg
      - run:
          name: Run tests
          command: |
            cd webapp && NODE_OPTIONS="--max-old-space-size=4096" npm run test-ci
          environment:
            JEST_JUNIT_OUTPUT_DIR: ./reports/
      - run:
          name: Check memory usage
          command: |
            echo "Memory usage after tests:"
            free -h
            echo "Disk usage:"
            df -h
          when: always
      - store_test_results:
          path: ./webapp/reports/
      - sonarcloud/scan

  browser_test:
    environment:
      SENTRY_ORG: nick-brett
      SENTRY_PROJECT: bem-backend
      SENTRY_ENVIRONMENT: staging
      SENTRY_RELEASE: << pipeline.git.revision >>
      LIGHTHOUSE_ENABLED: "true"
    docker:
      - image: cimg/node:22.23.1-browsers
    steps:
      - run: sudo apt-get update
      - browser-tools/install-chrome:
          replace-existing: true
      - browser-tools/install-chromedriver
      - restore_cache:
          name: Restore Lighthouse CLI cache
          keys:
            - lighthouse-cli-{{ .Branch }}-
            - lighthouse-cli-
      - checkout:
          method: blobless
      - restore_cache:
          name: Restore node_modules and next cache
          keys:
            # when lock file changes, use increasingly general patterns to restore cache
            - node-v7-fresh-{{ .Branch }}-{{ checksum "webapp/package-lock.json" }}
            - node-v7-fresh-{{ .Branch }}-
            - node-v7-fresh-
      - attach_workspace:
          at: webapp
      - install_doppler
      - run:
          name: Setup Wrangler configuration
          command: |
            cd webapp && ./scripts/setup-wrangler-config.sh stg

      - run:
          name: Install Lighthouse CLI (if not cached)
          command: |
            sudo npm install -g @lhci/cli@0.9.x
      - save_cache:
          name: Cache Lighthouse CLI
          paths:
            - /usr/local/lib/node_modules/@lhci
          key: lighthouse-cli-{{ .Branch }}-
      - run:
          name: Run Lighthouse checks
          command: |
            cd webapp && npm run lighthouse-staging

  deploy:
    environment:
      SENTRY_ORG: nick-brett
      SENTRY_PROJECT: bem-backend
      SENTRY_ENVIRONMENT: production
      SENTRY_RELEASE: << pipeline.git.revision >>
    docker:
      - image: cimg/node:22.23.1
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          name: Restore node_modules
          keys:
            # when lock file changes, use increasingly general patterns to restore cache
            - node-v7-fresh-{{ .Branch }}-{{ checksum "webapp/package-lock.json" }}
            - node-v7-fresh-{{ .Branch }}-
            - node-v7-fresh-
      - attach_workspace:
          at: webapp
      - install_doppler
      - run:
          name: Setup Wrangler configuration
          command: |
            cd webapp && ./scripts/setup-wrangler-config.sh stg

      - run:
          name: Install jq
          command: |
            sudo apt-get update && sudo apt-get install -y jq
      - run:
          name: Sync Doppler secrets to Cloudflare (production)
          command: |
            chmod +x webapp/scripts/sync-doppler-secrets.sh
            ./webapp/scripts/sync-doppler-secrets.sh --project webapp --config prd --env production

      - run:
          name: Deploying to Cloudflare
          command: |
            cd webapp
            npm run deploy

  deploy-preview:
    environment:
      SENTRY_ORG: nick-brett
      SENTRY_PROJECT: bem-backend
      SENTRY_ENVIRONMENT: preview
      SENTRY_RELEASE: << pipeline.git.revision >>
    docker:
      - image: cimg/node:22.23.1
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          name: Restore node_modules
          keys:
            # when lock file changes, use increasingly general patterns to restore cache
            - node-v7-fresh-{{ .Branch }}-{{ checksum "webapp/package-lock.json" }}
            - node-v7-fresh-{{ .Branch }}-
            - node-v7-fresh-
      - attach_workspace:
          at: webapp
      - install_doppler
      - run:
          name: Setup Wrangler configuration
          command: |
            cd webapp && ./scripts/setup-wrangler-config.sh stg

      - run:
          name: Install jq
          command: |
            sudo apt-get update && sudo apt-get install -y jq
      - run:
          name: Sync Doppler secrets to Cloudflare (preview)
          command: |
            chmod +x webapp/scripts/sync-doppler-secrets.sh
            if ! ./webapp/scripts/sync-doppler-secrets.sh --project webapp --config stg --env preview; then
              echo "⚠️  Warning: Failed to sync secrets to Cloudflare preview. This may be due to script settings conflicts."
              echo "Continuing with deployment as this is not critical for preview environments..."
            fi

      - run:
          name: Deploying preview to Cloudflare
          command: |
            cd webapp
            npm run deploy-preview

workflows:
  build_test_deploy:
    jobs:
      - ggshield/scan:
          name: ggshield-scan
          base_revision: << pipeline.git.base_revision >>
          revision: <<pipeline.git.revision>>
          context: common
      - build
      - code_test:
          requires:
            - build
          context: SonarCloud
      - browser_test:
          requires:
            - build
      - deploy:
          requires:
            - browser_test
            - code_test
          filters:
            branches:
              only: main
          context: common
      - deploy-preview:
          requires:
            - browser_test
            - code_test
          filters:
            branches:
              ignore: main
          context: common
