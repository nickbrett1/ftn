openapi: 3.0.3
info:
  title: Stripe Toddler API
  description: Single backend worker written in Rust powering the toddler iPad POS app and the executive inventory/analytics admin dashboard.
  version: 1.0.0
servers:
  - url: https://stripe-toddler.fintechnick.workers.dev
    description: Production Cloudflare Worker Edge
paths:
  /api/attest/challenge:
    post:
      summary: Request App Attest Challenge
      description: Returns a unique, short-lived cryptographic challenge to the iPad client to prevent replay attacks during attestation or assertion verification.
      operationId: getAttestChallenge
      responses:
        '200':
          description: Challenge generated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    type: string
                    format: byte
                    description: Base64-encoded challenge bytes.
                  expires_at:
                    type: integer
                    description: Unix epoch timestamp in seconds when this challenge expires.

  /api/attest/verify:
    post:
      summary: Verify Apple App Attest Attestation
      description: Verifies the App Attest attestation object from the iPad and registers the generated key ID for assertion verification on subsequent calls.
      operationId: verifyAttest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - device_id
                - key_id
                - attestation_object
                - challenge
              properties:
                device_id:
                  type: string
                  description: Unique identifier for the client device.
                key_id:
                  type: string
                  description: The key credential ID generated by App Attest on the iPad.
                attestation_object:
                  type: string
                  format: byte
                  description: Base64-encoded CBOR attestation statement returned by Apple.
                challenge:
                  type: string
                  description: The original challenge string verified against the attestation payload.
      responses:
        '200':
          description: Attestation verified and public key registered in KV.
        '400':
          description: Invalid challenge or malformed attestation payload.
        '401':
          description: App Attest signature validation failed.

  /api/pos/inventory/{barcode}:
    get:
      summary: Look up an Item by Barcode
      description: Looks up an inventory item by its scanned barcode string. Used by the iPad POS app. Secured by App Attest assertion headers.
      operationId: lookupPosItem
      parameters:
        - name: barcode
          in: path
          required: true
          description: Scanned barcode text.
          schema:
            type: string
      security:
        - AppAttestAssertion: []
      responses:
        '200':
          description: Item found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
        '404':
          description: Item not found.
        '401':
          description: Missing or invalid App Attest assertion signature.

  /api/terminal/connection-token:
    post:
      summary: Get Stripe Terminal Connection Token
      description: Contacts Stripe's backend to generate a short-lived Connection Token. The iPad app's Stripe Terminal SDK uses this to authorize connections to the Reader M2.
      operationId: getTerminalToken
      security:
        - AppAttestAssertion: []
      responses:
        '200':
          description: Token created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                    description: The raw connection token secret string.
        '401':
          description: Unauthenticated request.
        '502':
          description: Error communicating with Stripe API.

  /api/terminal/payment-intent:
    post:
      summary: Create Stripe Terminal Payment Intent
      description: Instructs the backend to create a Stripe PaymentIntent configured for card_present transactions. Returns the client secret to the iPad app.
      operationId: createPaymentIntent
      security:
        - AppAttestAssertion: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount_cents
                - barcodes
              properties:
                amount_cents:
                  type: integer
                  minimum: 100
                  description: Total transaction cost in USD cents.
                barcodes:
                  type: array
                  items:
                    type: string
                  description: List of barcodes scanned during this transaction.
      responses:
        '200':
          description: Payment Intent generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_intent_id:
                    type: string
                    description: Unique ID of the created PaymentIntent (pi_xxx).
                  client_secret:
                    type: string
                    description: Client secret used by Stripe Terminal iOS SDK to authorize card collection.
        '400':
          description: Invalid request parameters.
        '401':
          description: Unauthenticated request.

  /api/terminal/capture:
    post:
      summary: Capture and Log Transaction
      description: Captures a payment intent authorized by the iPad Stripe Terminal SDK and logs the transaction details to D1 for analytics.
      operationId: captureTransaction
      security:
        - AppAttestAssertion: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_intent_id
                - amount_cents
                - items
              properties:
                payment_intent_id:
                  type: string
                  description: Stripe PaymentIntent ID to be captured.
                amount_cents:
                  type: integer
                  description: Verified total transaction cost in USD cents.
                items:
                  type: array
                  items:
                    type: object
                    required:
                      - barcode
                      - name
                      - price_cents
                      - quantity
                    properties:
                      barcode:
                        type: string
                      name:
                        type: string
                      price_cents:
                        type: integer
                      quantity:
                        type: integer
      responses:
        '200':
          description: Payment captured successfully and written to D1.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: captured
                  transaction_id:
                    type: string
                    description: The internal database UUID generated for this log entry.
        '400':
          description: Payment Intent cannot be captured or details mismatch.
        '401':
          description: Unauthenticated request.

  /api/admin/inventory:
    get:
      summary: List All Inventory Items
      description: Retrieves the entire list of inventory items. Used by the admin dashboard.
      operationId: listInventory
      security:
        - AdminApiKey: []
      responses:
        '200':
          description: List of items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryItem'
    post:
      summary: Create or Update Inventory Item
      description: Creates a new inventory item or updates an existing item keyed by barcode in KV.
      operationId: updateInventoryItem
      security:
        - AdminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryItem'
      responses:
        '200':
          description: Inventory item saved successfully.
        '400':
          description: Malformed payload.

  /api/admin/analytics:
    get:
      summary: Retrieve Store Sales History
      description: Queries the D1 SQLite database to fetch historical transaction logs.
      operationId: getSalesAnalytics
      security:
        - AdminApiKey: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of logged transactions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionRecord'

components:
  securitySchemes:
    AdminApiKey:
      type: apiKey
      in: header
      name: X-Admin-API-Key
    AppAttestAssertion:
      type: apiKey
      in: header
      name: X-App-Attest-Assertion
      description: Base64-encoded assertion signature generated by iOS App Attest, signing the HTTP request payload and challenge.
  schemas:
    InventoryItem:
      type: object
      required:
        - barcode
        - name
        - price_cents
        - image_url
      properties:
        barcode:
          type: string
          description: The 1D or 2D barcode string associated with the toy.
        name:
          type: string
          description: Descriptive name of the item.
        price_cents:
          type: integer
          description: Price in USD cents (e.g., 500 represents $5). Must be an integer value.
        image_url:
          type: string
          format: uri
          description: Public edge URL of the uploaded image asset (e.g., hosted on Cloudflare R2).
    TransactionRecord:
      type: object
      required:
        - transaction_id
        - payment_intent_id
        - amount_cents
        - status
        - created_at
        - items
      properties:
        transaction_id:
          type: string
          format: uuid
        payment_intent_id:
          type: string
        amount_cents:
          type: integer
        status:
          type: string
        created_at:
          type: integer
          description: Unix timestamp of the transaction log.
        items:
          type: array
          items:
            type: object
            required:
              - barcode
              - name
              - price_cents
              - quantity
            properties:
              barcode:
                type: string
              name:
                type: string
              price_cents:
                type: integer
              quantity:
                type: integer
